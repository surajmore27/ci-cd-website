<!DOCTYPE html>
<html>
<head>
    <title>My CI/CD Website</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>My CI/CD Website 🚀</h1>
    <p id="text">Welcome to my website</p>

    <!-- Button 1 -->
    <button onclick="changeText()">Change Text</button>

    <!-- Button 2 -->
    <button onclick="changeColor()">Change Background</button>

    <!-- Button 3 -->
    <button onclick="showMessage()">Show Message</button>

    <script>
        function changeText() {
            document.getElementById("text").innerHTML = "Text Changed Successfully!";
        }

        function changeColor() {
            document.body.style.backgroundColor = "lightblue,yellow,black,cyan,orange";
        }

        function showMessage() {
            alert("Hello! This is a working button.");
        }
    </script>

</body>
</html>
